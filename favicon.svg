<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#0A1F10"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#52B788" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#52B788" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#95D5B2"/>
      <stop offset="50%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C060"/>
      <stop offset="100%" stop-color="#E9C46A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Glow overlay -->
  <circle cx="50" cy="50" r="48" fill="url(#glow)"/>

  <!-- Border ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#52B788" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Leaf shape - main body -->
  <path d="M50 20 C65 22, 78 35, 75 52 C72 68, 58 76, 50 78 C50 78, 50 78, 50 78 C50 78, 42 68, 42 55 C42 40, 50 20, 50 20 Z"
        fill="url(#leaf)" filter="url(#shadow)"/>

  <!-- Leaf center vein -->
  <line x1="50" y1="22" x2="50" y2="76" stroke="#1B4D36" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>

  <!-- Leaf side veins left -->
  <line x1="50" y1="35" x2="44" y2="44" stroke="#1B4D36" stroke-width="0.9" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="50" y1="47" x2="43" y2="54" stroke="#1B4D36" stroke-width="0.9" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="50" y1="59" x2="45" y2="65" stroke="#1B4D36" stroke-width="0.9" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Leaf side veins right -->
  <line x1="50" y1="35" x2="62" y2="43" stroke="#1B4D36" stroke-width="0.9" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="50" y1="47" x2="63" y2="53" stroke="#1B4D36" stroke-width="0.9" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="50" y1="59" x2="61" y2="64" stroke="#1B4D36" stroke-width="0.9" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Gold stem dot -->
  <circle cx="50" cy="79" r="3.5" fill="url(#gold)" opacity="0.9"/>

  <!-- Small highlight on leaf -->
  <ellipse cx="58" cy="32" rx="5" ry="8" fill="white" opacity="0.1" transform="rotate(-20 58 32)"/>
</svg>
